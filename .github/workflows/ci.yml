name: "ci"

on:
  pull_request:
    branches:
      - "main"
  pull_request_target:
    types: [labeled, reopened]
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUPPET_FORGE_TOKEN: ${{ secrets.PUPPET_FORGE_TOKEN_PUBLIC }}
  BUNDLE_RUBYGEMS___PUPPETCORE__PUPPET__COM: "forge-key:${{ secrets.PUPPET_FORGE_TOKEN_PUBLIC }}"

jobs:
  Spec:
    if: github.event_name != 'pull_request_target'
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_ci.yml@main"
    with:
      runs_on: "ubuntu-24.04"
    secrets: "inherit"

  setup_matrix:
    name: "Setup Test Matrix"
    runs-on: "ubuntu-24.04"
    # For pull_request_target (fork PRs), only run once the allowed-for-ci label is present.
    if: >-
      github.event_name != 'pull_request_target' ||
      contains(github.event.pull_request.labels.*.name, 'allowed-for-ci')
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}

    env:
      BUNDLE_WITHOUT: release_prep

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Setup ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Test Matrix
        id: get-matrix
        run: |
          bundle exec matrix_from_metadata_v3 --provision-prefer provision_service --nightly --platform-exclude scientific-7 --platform-exclude ubuntu-18.04 --platform-exclude ubuntu-20.04

  approval_gate:
    name: "Fork PR approval gate"
    needs: setup_matrix
    runs-on: ubuntu-latest
    # Funnels the puppetcore-fork environment approval through a single non-matrix job.
    # Same-repo PRs and workflow_dispatch skip this; Acceptance handles the skipped case
    # via always() below.
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.fork == true
    environment: puppetcore-fork
    steps:
      - name: "Approval received"
        run: |
          echo "Approved fork PR #${{ github.event.pull_request.number }}"
          echo "Head SHA at approval: ${{ github.event.pull_request.head.sha }}"

  Acceptance:
    name: "Acceptance tests (${{matrix.platforms.label}}, ${{matrix.collection.collection || matrix.collection}})"
    needs: [setup_matrix, approval_gate]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup_matrix.outputs.matrix)}}
    # always() is required so this is evaluated when approval_gate is skipped
    # (non-fork events); without it, dependency-skip would cascade.
    if: >-
      always() &&
      needs.setup_matrix.result == 'success' &&
      (needs.approval_gate.result == 'success' ||
       needs.approval_gate.result == 'skipped')

    env:
      BUNDLE_WITHOUT: release_prep
      PUPPET_GEM_VERSION: '~> 8.9'
      FACTER_GEM_VERSION: 'https://github.com/puppetlabs/facter#main'  # why is this set?
      TWINGATE_PUBLIC_REPO_KEY: ${{ secrets.TWINGATE_PUBLIC_REPO_KEY }}

    steps:
      - name: "Install Twingate"
        uses: "twingate/github-action@v1"
        with:
          service-key: ${{ secrets.TWINGATE_PUBLIC_REPO_KEY }}

      - name: Fix DNS
        run: |
          echo "=== Remove Azure DNS from eth0 interface ==="
          sudo resolvectl dns eth0 ""

          echo "=== Configure Twingate DNS properly ==="
          sudo resolvectl dns sdwan0 100.95.0.251 100.95.0.252
          sudo resolvectl domain sdwan0 delivery.puppetlabs.net

          echo "=== Flush DNS cache ==="
          sudo resolvectl flush-caches

          echo "=== Check new configuration ==="
          resolvectl status

          echo "=== Test DNS resolution ==="
          nslookup artifactory.delivery.puppetlabs.net

      - name: "Checkout"
        uses: "actions/checkout@v4"
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Setup ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: "Bundle environment"
        run: |
          bundle env

      - name: "Provision environment"
        run: |
          bundle exec rake "litmus:provision[${{matrix.platforms.provider}},${{ matrix.platforms.image }}]"
          # Redact password
          FILE='spec/fixtures/litmus_inventory.yaml'
          sed -e 's/password: .*/password: "[redacted]"/' < $FILE || true

      - name: "Fix Debian 10 EOL repositories"
        if: contains(matrix.platforms.image, 'debian-10') || contains(matrix.platforms.image, 'buster')
        run: |
          bundle exec bolt command run "
            sed -i 's|deb.debian.org|archive.debian.org|g' /etc/apt/sources.list &&
            sed -i 's|security.debian.org|archive.debian.org|g' /etc/apt/sources.list &&
            sed -i '/buster-updates/d' /etc/apt/sources.list &&
            echo 'Acquire::Check-Valid-Until \"false\";' > /etc/apt/apt.conf.d/99no-check-valid-until &&
            echo 'Acquire::AllowInsecureRepositories \"true\";' > /etc/apt/apt.conf.d/99allow-insecure &&
            echo 'Acquire::AllowDowngradeToInsecureRepositories \"true\";' >> /etc/apt/apt.conf.d/99allow-insecure
          " -t ssh_nodes -i spec/fixtures/litmus_inventory.yaml

      - name: "Install Puppet agent"
        run: |
          if [[ "${{ matrix.collection.version }}" ]] ; then
            export PUPPET_VERSION=${{ matrix.collection.version }}
            bundle exec rake 'litmus:install_agent[${{ matrix.collection.collection }}]'
          else
            bundle exec rake 'litmus:install_agent[${{ matrix.collection }}]'
          fi

      - name: "Install module"
        run: |
          bundle exec rake 'litmus:install_module'

      - name: "Authenticate to GCP"
        run: |
          echo '${{ secrets.GCP_CONNECTION }}' >> creds.json
          bundle exec bolt file upload creds.json creds.json -t ssh_nodes -i spec/fixtures/litmus_inventory.yaml
          bundle exec bolt command run "gcloud auth activate-service-account --key-file creds.json" -t ssh_nodes -i spec/fixtures/litmus_inventory.yaml

      - name: "Run acceptance tests"
        run: |
          bundle exec rake 'litmus:acceptance:parallel'

      - name: "Remove test environment"
        if: ${{ always() }}
        continue-on-error: true
        run: |
            bundle exec rake 'litmus:tear_down'
